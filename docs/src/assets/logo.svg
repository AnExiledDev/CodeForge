<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ember-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="steel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#78716c"/>
    </linearGradient>
  </defs>
  <!-- Anvil body -->
  <path d="M6 20h20v3c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2v-3z" fill="url(#steel-grad)"/>
  <!-- Anvil horn (left) -->
  <path d="M6 20l-3 2v1h3v-3z" fill="#78716c"/>
  <!-- Anvil top (working face) -->
  <rect x="8" y="17" width="16" height="3" rx="1" fill="#a8a29e"/>
  <!-- Anvil step -->
  <rect x="18" y="14" width="6" height="3" rx="0.5" fill="#8a8580"/>
  <!-- Hammer handle -->
  <rect x="14.5" y="2" width="3" height="11" rx="1.5" fill="#57534e" transform="rotate(-15 16 8)"/>
  <!-- Hammer head -->
  <rect x="11" y="1" width="10" height="5" rx="1.5" fill="url(#ember-grad)" transform="rotate(-15 16 3.5)"/>
  <!-- Spark particles -->
  <circle cx="10" cy="14" r="1" fill="#f97316" opacity="0.9"/>
  <circle cx="22" cy="12" r="0.8" fill="#fb923c" opacity="0.7"/>
  <circle cx="13" cy="11" r="0.6" fill="#fdba74" opacity="0.8"/>
</svg>
